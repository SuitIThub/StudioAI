openapi: 3.1.0
info:
  title: StudioAI API
  version: "0.4.0"
  description: |
    Stage 4 – Core chat + capture/describe/index/search + scene feedback.
    OpenAPI is the DTO source of truth (Decision B).
  x-contract-version: "0.4.0"
servers:
  - url: http://127.0.0.1:7200
    description: Core (main PC)
  - url: http://127.0.0.1:7850
    description: Worker (Heimserver)

paths:
  /health:
    get:
      operationId: getCoreHealth
      tags: [core]
      responses:
        "200":
          description: Core health (includes worker online flag)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoreHealthResponse"

  /v1/personas:
    get:
      operationId: listPersonas
      tags: [core]
      responses:
        "200":
          description: Chat personas (Stheno / Satyr)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonaListResponse"

  /v1/profiles:
    get:
      operationId: listProfiles
      tags: [core]
      responses:
        "200":
          description: Model role profiles

  /v1/models:
    get:
      operationId: listWorkerModelsViaCore
      tags: [core]
      responses:
        "200":
          description: Models from worker
        "503":
          description: Worker offline

  /v1/chat:
    post:
      operationId: createChat
      tags: [core]
      summary: Multi-turn chat with persona / role routing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoreChatRequest"
      responses:
        "200":
          description: JSON chat result or SSE stream (stream=true)
        "400":
          description: Routing error
        "503":
          description: Worker offline

  /v1/structured:
    post:
      operationId: createStructured
      tags: [core]
      summary: Structured JSON via technical model (Qwen) + GBNF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StructuredRequest"
      responses:
        "200":
          description: Parsed JSON probe result
        "503":
          description: Worker offline

  /v1/posecode:
    post:
      operationId: derivePosecode
      tags: [core]
      summary: Rule-based posecode from pose_compact (no LLM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pose_compact]
              properties:
                pose_compact: { type: string }
      responses:
        "200":
          description: tags + text

  /v1/capture:
    post:
      operationId: captureViews
      tags: [core]
      summary: Capture Studio views via Bridge + pose_compact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [character_id]
              properties:
                character_id: { type: integer }
                pose_path: { type: string, nullable: true }
                views:
                  type: array
                  items: { type: string }
                size: { type: integer, default: 512 }
      responses:
        "200":
          description: captures + pose_compact + posecode
        "503":
          description: Bridge offline

  /v1/describe:
    post:
      operationId: describeAndIndex
      tags: [core]
      summary: Capture or offline folder → captions → merge → store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                folder: { type: string, nullable: true }
                character_id: { type: integer, nullable: true }
                pose_path: { type: string, nullable: true }
                use_joycaption: { type: boolean, default: true }
                use_merge: { type: boolean, default: true }
      responses:
        "200":
          description: Indexed pose

  /v1/index/folder:
    post:
      operationId: indexFolder
      tags: [core]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folder]
              properties:
                folder: { type: string }
                use_joycaption: { type: boolean, default: false }
                use_merge: { type: boolean, default: true }
      responses:
        "200":
          description: OK

  /v1/index/batch:
    post:
      operationId: indexBatch
      tags: [core]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [root]
              properties:
                root: { type: string }
                use_joycaption: { type: boolean, default: false }
                use_merge: { type: boolean, default: true }
                limit: { type: integer, nullable: true }
      responses:
        "200":
          description: Batch result

  /v1/index/paths:
    post:
      operationId: indexPaths
      tags: [core]
      summary: Index explicit pose file/folder paths (PoseBrowser selection)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths]
              properties:
                paths:
                  type: array
                  items: { type: string }
                character_id: { type: integer, default: 0 }
                use_joycaption: { type: boolean, default: true }
                use_merge: { type: boolean, default: true }
                size: { type: integer, default: 512 }
                allow_stub: { type: boolean, default: false }
      responses:
        "200":
          description: OK

  /v1/index/clear:
    post:
      operationId: clearIndex
      tags: [core]
      summary: Delete all pose index rows (SQLite + FTS)
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  deleted: { type: integer }
                  total_in_store: { type: integer }

  /v1/index/lookup:
    post:
      operationId: lookupIndex
      tags: [core]
      summary: Lookup index rows by library pose paths
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths]
              properties:
                paths:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: Lookup result

  /v1/search:
    post:
      operationId: searchPoses
      tags: [core]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                limit: { type: integer, default: 20 }
      responses:
        "200":
          description: FTS hits

  /v1/poses/{pose_id}:
    get:
      operationId: getPoseIndex
      tags: [core]
      parameters:
        - name: pose_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Stored index row
        "404":
          description: Not found

  /v1/scene-feedback/analyze:
    post:
      operationId: analyzeSceneFeedback
      tags: [core]
      summary: OnDemand scene feedback (Bridge PNG → JoyCaption → optional polish)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SceneFeedbackAnalyzeRequest"
      responses:
        "200":
          description: Caption (+ optional polish); may return paused=true during index
        "503":
          description: JoyCaption or Bridge unavailable

  /v1/scene-feedback/watch/start:
    post:
      operationId: startSceneFeedbackWatch
      tags: [core]
      summary: Start debounced Watch loop (pauses while indexing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SceneFeedbackWatchRequest"
      responses:
        "200":
          description: Watch started

  /v1/scene-feedback/watch/stop:
    post:
      operationId: stopSceneFeedbackWatch
      tags: [core]
      responses:
        "200":
          description: Watch stopped

  /v1/scene-feedback/status:
    get:
      operationId: getSceneFeedbackStatus
      tags: [core]
      responses:
        "200":
          description: Watch state + latest result + vision gate

  /v1/scene-feedback/latest:
    get:
      operationId: getSceneFeedbackLatest
      tags: [core]
      responses:
        "200":
          description: Latest analyze/watch result
        "404":
          description: No result yet

  # --- Worker (thin) – Stage 1 surface, still used by Core ---
  /models:
    get:
      operationId: listModels
      tags: [worker]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelListResponse"
  /models/{model_id}/load:
    post:
      operationId: loadModel
      tags: [worker]
      parameters:
        - name: model_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Loaded
        "409":
          description: max_loaded capacity
  /models/{model_id}/unload:
    post:
      operationId: unloadModel
      tags: [worker]
      parameters:
        - name: model_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Unloaded
  /models/swap:
    post:
      operationId: swapModels
      tags: [worker]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapRequest"
      responses:
        "200":
          description: Swapped
  /v1/completions:
    post:
      operationId: createCompletion
      tags: [worker]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: OK
  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      tags: [worker]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: OK or SSE when stream=true

components:
  schemas:
    CoreHealthResponse:
      type: object
      required: [status, contract_version, node_id, worker]
      properties:
        status: { type: string, enum: [ok, degraded] }
        contract_version: { type: string }
        node_id: { type: string }
        worker:
          type: object
          properties:
            url: { type: string }
            online: { type: boolean }
            health: { type: object, nullable: true }
        detail: { type: string, nullable: true }
    Persona:
      type: object
      required: [id, name, model_id, description]
      properties:
        id: { type: string }
        name: { type: string }
        model_id: { type: string }
        description: { type: string }
        default_max_tokens: { type: integer, description: "Persona generation budget" }
    PersonaListResponse:
      type: object
      required: [personas, default_persona]
      properties:
        personas:
          type: array
          items:
            $ref: "#/components/schemas/Persona"
        default_persona: { type: string }
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string }
        content: { type: string }
    CoreChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        persona: { type: string, nullable: true, description: "stheno | satyr" }
        model: { type: string, nullable: true }
        max_tokens:
          type: integer
          nullable: true
          description: "Omit to use persona default (satyr=16384, stheno=8192)"
        temperature: { type: number, default: 0.7 }
        stream: { type: boolean, default: true }
    StructuredRequest:
      type: object
      properties:
        prompt: { type: string, nullable: true }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          nullable: true
        model: { type: string, nullable: true }
        max_tokens: { type: integer, default: 256 }
        temperature: { type: number, default: 0.1 }
        grammar_file: { type: string, default: smoke_json.gbnf }
        grammar: { type: string, nullable: true }
    HealthResponse:
      type: object
      required: [status, contract_version, loaded_models, backend]
      properties:
        status: { type: string }
        contract_version: { type: string }
        backend: { type: string }
        loaded_models:
          type: array
          items: { type: string }
        detail: { type: string, nullable: true }
    ModelInfo:
      type: object
      required: [id, name, roles, backend, loaded, vram_mb]
      properties:
        id: { type: string }
        name: { type: string }
        roles:
          type: array
          items: { type: string }
        backend: { type: string }
        loaded: { type: boolean }
        vram_mb: { type: integer }
        path: { type: string, nullable: true }
    ModelListResponse:
      type: object
      required: [models, max_loaded]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"
        max_loaded: { type: integer }
    SwapRequest:
      type: object
      required: [unload_id, load_id]
      properties:
        unload_id: { type: string }
        load_id: { type: string }
    CompletionRequest:
      type: object
      required: [prompt]
      properties:
        model: { type: string, nullable: true }
        prompt: { type: string }
        max_tokens: { type: integer, default: 256 }
        temperature: { type: number, default: 0.2 }
        grammar: { type: string, nullable: true }
        grammar_file: { type: string, nullable: true }
    ChatCompletionRequest:
      type: object
      required: [messages]
      properties:
        model: { type: string, nullable: true }
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        max_tokens: { type: integer, default: 512 }
        temperature: { type: number, default: 0.7 }
        stream: { type: boolean, default: false }
        grammar: { type: string, nullable: true }
        grammar_file: { type: string, nullable: true }

    SceneFeedbackAnalyzeRequest:
      type: object
      required: [character_id]
      properties:
        character_id: { type: integer, default: 0 }
        caption_preset: { type: string, nullable: true }
        camera_source:
          type: string
          default: studio_active
          description: studio_active (= Bridge angle current) | front_full | three_quarter
        instruction: { type: string, nullable: true }
        polish_with_chat: { type: boolean, nullable: true }
        size: { type: integer, default: 768 }
        image_path:
          type: string
          nullable: true
          description: Offline PNG; skips Bridge capture
    SceneFeedbackWatchRequest:
      type: object
      required: [character_id]
      properties:
        character_id: { type: integer, default: 0 }
        caption_preset: { type: string, nullable: true }
        camera_source: { type: string, default: studio_active }
        instruction: { type: string, nullable: true }
        polish_with_chat: { type: boolean, nullable: true }
        size: { type: integer, default: 768 }
        debounce_s: { type: number, nullable: true }
