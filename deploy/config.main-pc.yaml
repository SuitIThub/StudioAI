# StudioAI Core (primary) on the Studio / main PC – Stage 4
# Start: STUDIO_AI_CORE_CONFIG=.../config.main-pc.yaml studio-ai-core

node:
  id: main-pc
  role: primary

core:
  host: "0.0.0.0"
  # Ghost-port range: binds first free in 7200–7299 (same idea as Bridge 7100–7199).
  # Plugin walks that range once, then locks. Avoids reboot after hard Studio/Core kills.
  port: 7200
  default_persona: stheno
  worker_timeout_s: 180
  health_timeout_s: 3
  grammars_dir: "grammars"

worker_remote:
  # Heimserver LAN IP (Worker)
  url: "http://192.168.178.21:7850"
  token: ""

bridge:
  # StudioPoseBridge on the same PC as StudioNeoV2.
  # Port is auto-discovered on first contact (scan 7100–7199); url host + preferred start port.
  url: "http://127.0.0.1:7100"
  token: "64902a9327bc45d891164939876de30d"   # X-Pose-Token from BepInEx config

indexing:
  db_path: "../data/pose_index.sqlite"
  capture_dir: "../data/captures"
  joycaption_quant: "8bit"   # 8bit recommended for 16GB VRAM
  # pose_index = body pose only | scene_feedback = full scene (Stufe 4)
  caption_preset: pose_index
  cameras:
    always: [front, three_quarter]
    optional: [one_quarter]
    one_quarter_mode: auto    # auto | always | off
    one_quarter_angle: "45"   # numeric Bridge angle until one_quarter preset exists

scene_feedback:
  caption_preset: scene_feedback   # scene_feedback | scene_critique | Versaut (NSFW)
  debounce_s: 12                   # Watch interval (min 5)
  polish_with_chat: true          # optional Stheno tips after JoyCaption
